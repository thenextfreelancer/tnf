<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favicon Generator</title>
</head>
<body>
    <canvas id="canvas" width="512" height="512"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Background
        ctx.fillStyle = '#0A0A0A';
        ctx.fillRect(0, 0, 512, 512);
        
        // TN monogram in Signal Red
        ctx.fillStyle = '#FF3366';
        
        // T letter - horizontal bar
        ctx.fillRect(100, 140, 312, 60);
        // T letter - vertical bar
        ctx.fillRect(216, 140, 80, 312);
        
        // N letter - left vertical
        ctx.fillRect(132, 200, 60, 252);
        // N letter - right vertical
        ctx.fillRect(320, 200, 60, 452);
        // N letter - diagonal
        ctx.beginPath();
        ctx.moveTo(192, 200);
        ctx.lineTo(192, 280);
        ctx.lineTo(320, 380);
        ctx.lineTo(320, 300);
        ctx.closePath();
        ctx.fill();
        
        // Download as PNG
        setTimeout(() => {
            const link = document.createElement('a');
            link.download = 'favicon-512.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }, 500);
    </script>
</body>
</html>
