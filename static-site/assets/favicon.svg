<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#0A0A0A"/>
  
  <!-- Modern TN monogram -->
  <g fill="#FF3366">
    <!-- Stylized T -->
    <rect x="25" y="25" width="50" height="8"/>
    <rect x="46" y="25" width="8" height="50"/>
    
    <!-- Stylized forward slash / connecting element -->
    <rect x="35" y="45" width="30" height="6" transform="rotate(20 50 50)"/>
  </g>
</svg>
